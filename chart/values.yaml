# Only agencies with both a nibble and gobble configuration belong here.
# The chart guarantees a 1:1 pairing — every entry produces nibble + gobble + s3-upload containers.
#
# Prerequisites (created outside this chart):
#   Secret/aws-credentials          — keys: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   Secret/nibble-<slug>-secrets    — key: AUTH_SECRET  (only for agencies with auth configured)

global:
  nibbleImage: ghcr.io/ankoure/nibble:sha-ffabc2656f6ac3916ff79a55d04db4d19071d9ea
  gobbleImage: ghcr.io/ankoure/gobble@sha256:3aaee0892eb6e4f2902902dbebf8b483e8a2f911169aba79d42471321664cb38
  # Number of nibble pod replicas per agency.  Keep at 1 (the default) unless
  # you have addressed the in-memory state and SSE affinity constraints
  # described in the architecture docs — with replicas > 1 you also need a
  # PodDisruptionBudget (created automatically below when replicas > 1) and
  # sessionAffinity on the Service (already configured in service.yaml).
  replicas: 1
  aws:
    region: us-east-1
    # Set to an IAM role ARN to use IRSA (IAM Roles for Service Accounts) on
    # EKS instead of injecting static AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
    # credentials.  When set, the aws-credentials Secret is not required.
    #   irsaRoleArn: "arn:aws:iam::123456789012:role/transit-agencies"
    irsaRoleArn: ""
  nibble:
    gtfsReloadIntervalHours: "24"
    pollIntervalSeconds: "15"
    # Default S3 bucket for agencies without an explicit nibble.s3Bucket.
    # Corresponds to NIBBLE_S3_BUCKET in docker-compose .env.
    s3Bucket: ""
    # Persist operator-issued trip-assignment overrides across pod restarts.
    # When enabled, a 1Mi PVC is created per agency and mounted at
    # /data/overrides so they survive rolling updates and node evictions.
    overridesPvc:
      enabled: false
      storageClassName: ""  # "" → cluster default
      size: 1Mi
  gobble:
    gtfsRefreshIntervalDays: 7
    # URL at which gobble reaches nibble. Defaults to localhost because gobble
    # runs as a sidecar in the same Pod. Override here if you ever extract
    # gobble to its own Deployment and route via a Service DNS name.
    nibbleBaseUrl: "http://localhost:8080"
  resources:
    nibble:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    gobble:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    s3Upload:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

