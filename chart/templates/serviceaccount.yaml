{{- if $.Values.global.aws.irsaRoleArn }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: transit-agencies
  labels:
    {{- include "transit-agencies.labels" $ | nindent 4 }}
  annotations:
    # IRSA: EKS projects this annotation into a web identity token that the AWS
    # SDK picks up automatically.  No static credentials are needed when this
    # is set.  See: https://docs.aws.amazon.com/eks/latest/userguide/iam-roles-for-service-accounts.html
    eks.amazonaws.com/role-arn: {{ $.Values.global.aws.irsaRoleArn | quote }}
{{- end }}
