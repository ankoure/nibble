{{- range .Values.agencies }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agency-{{ .slug }}
  labels:
    {{- include "transit-agencies.labels" $ | nindent 4 }}
    agency: {{ .slug }}
    region: {{ .region }}
spec:
  replicas: {{ .replicas | default $.Values.global.replicas | default 1 }}
  selector:
    matchLabels:
      agency: {{ .slug }}
  template:
    metadata:
      labels:
        agency: {{ .slug }}
        region: {{ .region }}
    spec:
      {{- if $.Values.global.aws.irsaRoleArn }}
      serviceAccountName: transit-agencies
      {{- end }}
      containers:

        # ── nibble ────────────────────────────────────────────────────────────
        - name: nibble
          image: {{ $.Values.global.nibbleImage }}
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                # Give the load balancer time to drain in-flight SSE connections
                # before Uvicorn receives SIGTERM.  Without this, rolling updates
                # hard-disconnect every connected SSE client immediately.
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            {{- toYaml (dig "resources" "nibble" $.Values.global.resources.nibble .) | nindent 12 }}
          env:
            - name: NIBBLE_ADAPTER
              value: {{ .nibble.adapter | quote }}
            - name: NIBBLE_NORMALIZER
              value: {{ .nibble.normalizer | quote }}
            - name: NIBBLE_GTFS_RT_URL
              value: {{ .nibble.gtfsRtUrl | quote }}
            - name: NIBBLE_GTFS_STATIC_URL
              value: {{ .nibble.gtfsStaticUrl | quote }}
            - name: NIBBLE_AGENCY_TIMEZONE
              value: {{ .nibble.timezone | quote }}
            - name: NIBBLE_POLL_INTERVAL_SECONDS
              value: {{ $.Values.global.nibble.pollIntervalSeconds | quote }}
            - name: NIBBLE_GTFS_RELOAD_INTERVAL_HOURS
              value: {{ $.Values.global.nibble.gtfsReloadIntervalHours | quote }}
            - name: NIBBLE_GTFS_STATIC_FIX
              value: {{ .nibble.gtfsStaticFix | quote }}
            - name: NIBBLE_S3_AGENCY_SLUG
              value: {{ .slug | quote }}
            - name: NIBBLE_S3_BUCKET
              value: {{ .nibble.s3Bucket | default $.Values.global.nibble.s3Bucket | quote }}
            - name: NIBBLE_S3_REGION
              value: {{ $.Values.global.aws.region | quote }}
            {{- if not $.Values.global.aws.irsaRoleArn }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            {{- end }}
            {{- if .nibble.ignoreUnknownTripIds }}
            - name: NIBBLE_IGNORE_UNKNOWN_TRIP_IDS
              value: "true"
            {{- end }}
            {{- if eq (toString .nibble.fillShapeDistTraveled) "false" }}
            - name: NIBBLE_FILL_SHAPE_DIST_TRAVELED
              value: "false"
            {{- end }}
            {{- if .nibble.passioStaticRoutesFile }}
            - name: NIBBLE_PASSIO_STATIC_ROUTES_FILE
              value: {{ .nibble.passioStaticRoutesFile | quote }}
            {{- end }}
            {{- if .nibble.auth }}
            - name: NIBBLE_AUTH_TYPE
              value: {{ .nibble.auth.type | quote }}
            {{- if .nibble.auth.paramName }}
            - name: NIBBLE_AUTH_PARAM_NAME
              value: {{ .nibble.auth.paramName | quote }}
            {{- end }}
            {{- if .nibble.auth.headerName }}
            - name: NIBBLE_AUTH_HEADER_NAME
              value: {{ .nibble.auth.headerName | quote }}
            {{- end }}
            - name: NIBBLE_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: nibble-{{ .slug }}-secrets
                  key: AUTH_SECRET
            {{- end }}
            {{- if $.Values.global.nibble.overridesPvc.enabled }}
            - name: NIBBLE_OVERRIDES_PATH
              value: /data/overrides/overrides.json
            {{- end }}
          {{- if $.Values.global.nibble.overridesPvc.enabled }}
          volumeMounts:
            - name: overrides
              mountPath: /data/overrides
          {{- end }}

        {{- if .gobble }}
        # ── gobble ────────────────────────────────────────────────────────────
        # Reads nibble's SSE stream at localhost:8080 — same Pod network namespace
        - name: gobble
          image: {{ $.Values.global.gobbleImage }}
          resources:
            {{- toYaml (dig "resources" "gobble" $.Values.global.resources.gobble .) | nindent 12 }}
          env:
            {{- if not $.Values.global.aws.irsaRoleArn }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            {{- end }}
            - name: AWS_DEFAULT_REGION
              value: {{ $.Values.global.aws.region | quote }}
          volumeMounts:
            - name: gobble-config
              mountPath: /app/config/local.json
              subPath: local.json
            - name: gobble-routes
              mountPath: /app/config/routes.json
              subPath: routes.json
            - name: data
              mountPath: /app/data

        # ── s3-upload ─────────────────────────────────────────────────────────
        # Shares the data volume with gobble; uploads CSVs once per hour.
        # Writes /tmp/last_upload_ok after each successful run so the liveness
        # probe can detect a silently-failing upload loop.
        - name: s3-upload
          image: {{ $.Values.global.gobbleImage }}
          resources:
            {{- toYaml $.Values.global.resources.s3Upload | nindent 12 }}
          command:
            - sh
            - -c
            - |
              # Seed the sentinel so the liveness probe passes before the first upload.
              date -u +%s > /tmp/last_upload_ok
              while true; do
                sleep $(( 3600 - $(date +%s) % 3600 ))
                if uv run python3 src/s3_upload.py; then
                  date -u +%s > /tmp/last_upload_ok
                else
                  echo "s3_upload.py exited non-zero; will retry next hour" >&2
                fi
              done
          livenessProbe:
            exec:
              # Fail if no successful upload in the last 2.5 hours (1h interval + 90m grace).
              command:
                - sh
                - -c
                - "test $(( $(date +%s) - $(cat /tmp/last_upload_ok) )) -lt 9000"
            initialDelaySeconds: 60
            periodSeconds: 300
            failureThreshold: 1
          env:
            {{- if not $.Values.global.aws.irsaRoleArn }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            {{- end }}
            - name: AWS_DEFAULT_REGION
              value: {{ $.Values.global.aws.region | quote }}
          volumeMounts:
            - name: gobble-config
              mountPath: /app/config/local.json
              subPath: local.json
            - name: gobble-routes
              mountPath: /app/config/routes.json
              subPath: routes.json
            - name: data
              mountPath: /app/data
        {{- end }}

      volumes:
        {{- if .gobble }}
        - name: gobble-config
          configMap:
            name: gobble-{{ .slug }}-config
        - name: gobble-routes
          configMap:
            name: gobble-{{ .gobble.agency | replace "_" "-" }}-routes
        - name: data
          {{- if $.Values.global.gobble.dataPvc.enabled }}
          persistentVolumeClaim:
            claimName: gobble-data-{{ .slug }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if $.Values.global.nibble.overridesPvc.enabled }}
        - name: overrides
          persistentVolumeClaim:
            claimName: nibble-overrides-{{ .slug }}
        {{- end }}
{{- end }}
