x-nibble-base: &nibble-base
  build: .
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 10s
  restart: unless-stopped
  develop:
    watch:
      - action: sync+restart
        path: ./nibble
        target: /app/nibble
      - action: rebuild
        path: pyproject.toml
      - action: rebuild
        path: uv.lock

x-aws: &aws
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

x-s3-common: &s3-common
  NIBBLE_S3_BUCKET: ${NIBBLE_S3_BUCKET}
  NIBBLE_S3_REGION: ${NIBBLE_S3_REGION:-us-east-1}

x-nibble-env-defaults: &nibble-env-defaults
  NIBBLE_GTFS_RELOAD_INTERVAL_HOURS: "24"

services:
  nibble-bat:
    <<: *nibble-base
    ports:
      - "8080:8080"
    environment:
      <<: [*aws, *s3-common, *nibble-env-defaults]
      NIBBLE_ADAPTER: passio
      NIBBLE_NORMALIZER: default
      NIBBLE_GTFS_RT_URL: ${BAT_GTFS_RT_URL}
      NIBBLE_GTFS_STATIC_URL: ${BAT_GTFS_STATIC_URL}
      NIBBLE_AGENCY_TIMEZONE: America/New_York
      NIBBLE_POLL_INTERVAL_SECONDS: 15
      NIBBLE_GTFS_STATIC_FIX: "false"
      NIBBLE_S3_AGENCY_SLUG: bat

