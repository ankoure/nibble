services:
  nibble:
    build: .
    ports:
      - "8080:8080"
    environment:
      NIBBLE_ADAPTER: mwrta
      NIBBLE_NORMALIZER: mwrta
      NIBBLE_GTFS_RT_URL: ${NIBBLE_GTFS_RT_URL}
      NIBBLE_GTFS_STATIC_URL: ${NIBBLE_GTFS_STATIC_URL}
      NIBBLE_AGENCY_TIMEZONE: America/New_York
      NIBBLE_POLL_INTERVAL_SECONDS: 15
      NIBBLE_GTFS_STATIC_FIX: "true"
      NIBBLE_S3_BUCKET: ${NIBBLE_S3_BUCKET}
      NIBBLE_S3_AGENCY_SLUG: ${NIBBLE_S3_AGENCY_SLUG:-}
      NIBBLE_S3_PREFIX: ${NIBBLE_S3_PREFIX:-gtfs}
      NIBBLE_S3_ARCHIVED_FEEDS_KEY: ${NIBBLE_S3_ARCHIVED_FEEDS_KEY:-archived_feeds.txt}
      NIBBLE_S3_REGION: ${NIBBLE_S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./nibble
          target: /app/nibble
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: uv.lock
